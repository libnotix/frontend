        "200":
          description: OK
    get:
      summary: List linked files
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
    delete:
      summary: Unlink file
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [fileId]
              properties:
                fileId: { type: integer }
      responses:
        "200":
          description: OK
  /exam-chats/{id}:
    post:
      summary: Exam AI chat (text reply JSON)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message: { type: string }
                fileIds:
                  type: array
                  items: { type: integer }
                idempotencyKey: { type: string }
                clientTabId: { type: string }
      responses:
        "200":
          description: OK
    get:
      summary: Get exam chat history
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
  /submissions/{id}:
    get:
      summary: Get submission with answers and question definitions
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
    put:
      summary: Update answers and/or teacher scores
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                answers:
                  type: array
                  items:
                    type: object
                    properties:
                      questionId: { type: integer }
                      answer: {}
                teacherScores:
                  type: array
                  items:
                    type: object
                    properties:
                      questionId: { type: integer }
                      teacherScore: { type: integer, nullable: true }
                      teacherFeedback: { type: string, nullable: true }
                studentId: { type: integer, nullable: true }
      responses:
        "200":
          description: OK
    delete:
      summary: Delete submission
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
  /submissions/{id}/finalize:
    post:
      summary: Finalize grading (sum scores)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
  /submissions/{id}/ai-review:
    post:
      summary: Run AI / deterministic review
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
  /submissions/{id}/pages:
    post:
      summary: Upload scanned pages (multipart, field `file`)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: OK
  /submissions/{id}/digitize:
    post:
      summary: OCR / extract answers from uploaded pages via AI
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
  /public/exams/{token}:
    get:
      summary: Public exam (no correctAnswer in questions)
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ExamQuestionType:
      type: string
      enum:
        - radio
        - checkbox
        - true_false
        - matching
        - ordering
        - grouping
        - fill_in_the_blank
        - short_answer
        - long_answer
    ExamQuestionInput:
      type: object
      required: [type, order, spec, maxPoints]
      properties:
        id:
          type: integer
          description: Existing question id for update
        type:
          $ref: "#/components/schemas/ExamQuestionType"
        order:
          type: integer
        title: { type: string, nullable: true }
        description: { type: string, nullable: true }
        spec: {}
        correctAnswer:
          description: Null for short_answer / long_answer / fill_in_the_blank
          nullable: true
        rubric: { type: string }
        maxPoints: { type: integer, minimum: 1 }
    ApiResponse:
      type: object
      properties:
        code:
          type: number
        message:
          type: string
    ValidationErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            reason:
              type: array
              items:
                type: string
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - firstName
        - lastName
      properties:
        username:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
    LoginStartRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
    LoginEndRequest:
      type: object
      required:
        - email
        - otp
      properties:
        email:
          type: string
        otp:
          type: string
    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    User:
      type: object
      properties:
        id:
          type: number
        username:
          type: string
        otpSecret:
          type: string
          nullable: true
        otpSecretExpiry:
          type: string
          format: date-time
          nullable: true
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
          nullable: true
    Subject:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    CreateSubjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    SchoolClass:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        classNumber:
          type: integer
        subjectId:
          type: integer
          nullable: true
        icon:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        createdBy:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
    CreateClassRequest:
      type: object
      required:
        - name
        - classNumber
      properties:
        name:
          type: string
        classNumber:
          type: integer
          minimum: 1
          maximum: 13
        subjectId:
          type: integer
        icon:
          type: string
        color:
          type: string
    UpdateClassRequest:
      type: object
      properties:
        name:
          type: string
        classNumber:
          type: integer
          minimum: 1
          maximum: 13
        subjectId:
          type: integer
          nullable: true
        icon:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
    Student:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          nullable: true
        userId:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
    CreateStudentRequest:
      type: object
      required:
        - firstName
        - lastName
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
    UpdateStudentRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          nullable: true
    FreeQueryRequest:
      type: object
      required:
        - prompt
      properties:
        prompt:
          type: string
          description: The prompt to send to the AI model
        model:
          type: string
          description: Gemini model to use (defaults to gemini-flash-latest)
          default: gemini-flash-latest
          example: gemini-flash-latest
        systemInstruction:
          type: string
          description: System instruction for the AI model (defaults to "You are a helpful assistant.")
          default: "You are a helpful assistant."
    CreateDraftRequest:
      type: object
      required:
        - title
        - format
        - content
      properties:
        title:
          type: string
        format:
          type: string
          enum: [sima_vazlat, oravazlat, eves_tanterv, egyeb]
        content:
          type: object
    UpdateDraftRequest:
      type: object
      properties:
        title:
          type: string
        format:
          type: string
          enum: [sima_vazlat, oravazlat, eves_tanterv, egyeb]
        content:
          type: object
    DraftLinkedFile:
      type: object
      required:
        - fileId
        - filename
      properties:
        fileId:
          type: integer
        filename:
          type: string
        sizeBytes:
          type: integer
          nullable: true
        mimeType:
          type: string
          nullable: true
        contextStatus:
          type: string
          enum: [ready, processing, fallback, blocked, error]
        contextMode:
          type: string
          enum: [gemini_file, fallback_text, none]
        statusMessage:
          type: string
    SlateNode:
      type: object
      additionalProperties: true
    DraftChatRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        currentContext:
          oneOf:
            - type: array
              items:
                $ref: "#/components/schemas/SlateNode"
            - $ref: "#/components/schemas/SlateNode"
            - type: string
          description: Current editor Slate JSON (array, node, or page envelope). String is accepted only for JSON-serialized content.
        editorOptions:
          type: array
          items:
            type: string
          description: Optional allowed Slate elements or editor constraints.
        baseRevision:
          oneOf:
            - type: string
            - type: integer
          description: Client draft revision used for this request. Used to detect stale edits.
        responseMode:
          type: string
          enum: [legacy, grouped, dual]
          description: Optional request-level mode override. Defaults to grouped.
        requestId:
          type: string
          description: Optional correlation id echoed by the server.
        idempotencyKey:
          type: string
          description: Optional replay key for deterministic change set generation.
    AiDiffGroup:
      type: object
      required:
        - groupId
        - groupIndex
        - label
        - pageId
        - operationCount
      properties:
        groupId:
          type: string
        groupIndex:
          type: integer
        label:
          type: string
        pageId:
          type: string
          description: Page/sheet identifier; currently always default-page.
        operationCount:
          type: integer
          description: Number of grouped operations controlled by one accept/reject.
    AiDiffTarget:
      type: object
      required:
        - pathVersion
      properties:
        targetNodeId:
          type: string
        path:
          type: array
          items:
            type: integer
        pathVersion:
          type: string
        startOffset:
          type: integer
        endOffset:
          type: integer
        insertPosition:
          type: string
          enum: [before, after, inside]
    AiDiffOperation:
      type: object
      required:
        - operationId
        - changeSetId
        - groupId
        - groupIndex
        - opIndex
        - action
        - target
      properties:
        operationId:
          type: string
        changeSetId:
          type: string
        groupId:
          type: string
        groupIndex:
          type: integer
        opIndex:
          type: integer
        action:
          type: string
          enum: [add, remove, replace]
        target:
          $ref: "#/components/schemas/AiDiffTarget"
        oldContent:
          type: array
          items:
            $ref: "#/components/schemas/SlateNode"
        newContent:
          type: array
          items:
            $ref: "#/components/schemas/SlateNode"
    AiConflictInfo:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum: [stale_revision, invalid_target, invalid_payload]
        message:
          type: string
        operationId:
          type: string
        groupId:
          type: string
        expectedRevision:
          type: string
        actualRevision:
          type: string
        hint:
          type: string
    DraftAiEditResponse:
      type: object
      required:
        - changeSetId
        - baseRevision
        - resultRevision
        - groups
        - operations
        - conflicts
        - checksum
        - messageToClient
      properties:
        changeSetId:
          type: string
        requestId:
          type: string
        baseRevision:
          type: string
        resultRevision:
          type: string
        groups:
          type: array
          items:
            $ref: "#/components/schemas/AiDiffGroup"
        operations:
          type: array
          items:
            $ref: "#/components/schemas/AiDiffOperation"
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/AiConflictInfo"
        checksum:
          type: string
        messageToClient:
          type: string
    LegacyAiOperation:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: [append, prepend, replace, remove, add]
        targetNodeId:
          type: string
          description: Preferred stable node id target for replace/remove operations.
        path:
          type: array
          items:
            type: integer
        content:
          oneOf:
            - type: string
            - type: object
            - type: array
              items:
                $ref: "#/components/schemas/SlateNode"
    DraftAiLegacyResponse:
      type: object
      required:
        - messageToClient
        - operations
      properties:
        messageToClient:
          type: string
        operations:
          type: array
          items:
            $ref: "#/components/schemas/LegacyAiOperation"
    DraftAiEditDualResponse:
      allOf:
        - $ref: "#/components/schemas/DraftAiEditResponse"
        - type: object
          required:
            - legacyOperations
          properties:
            legacyOperations:
              type: array
              items:
                $ref: "#/components/schemas/LegacyAiOperation"

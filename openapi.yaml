openapi: 3.0.0
info:
  title: Backend API
  version: 1.0.0
  description: API documentation for the backend service
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /:
    get:
      summary: Home page
      responses:
        "200":
          description: Successful response
          content:
            text/plain:
              schema:
                type: string
                example: "Home page!"
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Successful response
          content:
            text/plain:
              schema:
                type: string
                example: "OK"
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: Invalid request body or validation error
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - $ref: "#/components/schemas/ValidationErrorResponse"
        "409":
          description: User already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
  /auth/login/start:
    post:
      summary: Start login process (request OTP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginStartRequest"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      expiry:
                        type: number
                        description: Timestamp when OTP expires
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /auth/login/end:
    post:
      summary: Complete login process (verify OTP)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginEndRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "500":
          description: strict server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /auth/refresh:
    post:
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /auth/session:
    get:
      summary: Get current user session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Session retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
        "401":
          description: Invalid or missing token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /ai/query:
    post:
      summary: Free Gemini AI query
      description: Sends a free-form prompt to the Gemini model and returns the generated text response.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FreeQueryRequest"
      responses:
        "200":
          description: AI response generated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      text:
                        type: string
                        description: Generated text from the AI model
        "400":
          description: Missing or invalid prompt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "500":
          description: AI generation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /subjects:
    get:
      summary: List all subjects
      description: Returns all subjects for filtering and class tagging. Any authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of subjects
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      subjects:
                        type: array
                        items:
                          $ref: "#/components/schemas/Subject"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    post:
      summary: Create a subject
      description: Creates a new subject (admin only). For filtering and data mining.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSubjectRequest"
      responses:
        "201":
          description: Subject created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      subject:
                        $ref: "#/components/schemas/Subject"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  /classes:
    get:
      summary: List all school classes
      description: Returns all school classes. Accessible by teachers and admins.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of school classes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      classes:
                        type: array
                        items:
                          $ref: "#/components/schemas/SchoolClass"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    post:
      summary: Create a school class
      description: Creates a new school class. Any teacher or admin. Creator is added as class member.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassRequest"
      responses:
        "201":
          description: School class created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      class:
                        $ref: "#/components/schemas/SchoolClass"
        "400":
          description: Invalid request body or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /classes/{id}:
    get:
      summary: Get a school class by ID
      description: Returns a single school class. Accessible by teachers and admins.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: School class found
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      class:
                        $ref: "#/components/schemas/SchoolClass"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          description: School class not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    put:
      summary: Update a school class
      description: >
        Updates a school class. User must be a class member or admin.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClassRequest"
      responses:
        "200":
          description: School class updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      class:
                        $ref: "#/components/schemas/SchoolClass"
        "400":
          description: Invalid request body or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "403":
          description: Forbidden — not a class member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          description: School class not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
    delete:
      summary: Delete a school class
      description: Deletes a school class. Only accessible by admins.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: School class deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "403":
          description: Forbidden — only admins can delete classes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "404":
          description: School class not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
  /classes/{id}/students:
    get:
      summary: List students in a class
      description: Returns students enrolled in this class. Class member or admin.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      students:
                        type: array
                        items:
                          $ref: "#/components/schemas/Student"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Class not found
    post:
      summary: Add a student to a class
      description: Creates a new student and enrolls them in the class. Class member or admin.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentRequest"
      responses:
        "201":
          description: Student created and enrolled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      student:
                        $ref: "#/components/schemas/Student"
        "400":
          description: Invalid request body or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: School class not found
  /classes/{id}/students/{studentId}:
    delete:
      summary: Remove a student from a class
      description: Removes enrollment only; student record remains. Class member or admin.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: studentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Enrollment removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  /classes/{id}/members:
    get:
      summary: List class members (teachers)
      description: Returns users who are members of this class. Class member or admin.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      members:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Class not found
    post:
      summary: Add a teacher to a class
      description: Adds a user as class member. Class member or admin.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: integer
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      member:
                        $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Class or user not found
        "409":
          description: Already a member
  /classes/{id}/members/{userId}:
    delete:
      summary: Remove a teacher from a class
      description: Removes user from class members. Class member or admin.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  /me/classes:
    get:
      summary: Get my classes (student)
      description: For current user linked as a student; returns all classes they are enrolled in.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of classes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      classes:
                        type: array
                        items:
                          $ref: "#/components/schemas/SchoolClass"
        "401":
          description: Unauthorized
  /students/{id}:
    put:
      summary: Update a student (rename)
      description: Update firstName, lastName, email. Class member of any class the student is in, or admin.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentRequest"
      responses:
        "200":
          description: Student updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      student:
                        $ref: "#/components/schemas/Student"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Student not found
  /files/upload:
    post:
      summary: Upload a file
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: File uploaded
  /files:
    get:
      summary: List all files for user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of files
  /files/download/{id}:
    get:
      summary: Download a file
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: File stream
  /drafts:
    get:
      summary: List all drafts for user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of drafts
    post:
      summary: Create a draft
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDraftRequest"
      responses:
        "201":
          description: Draft created
  /drafts/{id}:
    get:
      summary: Get a specific draft
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Draft details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      draft:
                        type: object
                      files:
                        type: array
                        items:
                          $ref: "#/components/schemas/DraftLinkedFile"
    put:
      summary: Update a draft
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDraftRequest"
      responses:
        "200":
          description: Draft updated
    delete:
      summary: Delete a draft
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Draft deleted
  /draft-link/{id}:
    post:
      summary: Link a file to a draft
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fileId:
                  type: integer
      responses:
        "200":
          description: OK
    get:
      summary: Get files linked to a draft
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      files:
                        type: array
                        items:
                          $ref: "#/components/schemas/DraftLinkedFile"
    delete:
      summary: Unlink a file from a draft
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fileId:
                  type: integer
      responses:
        "200":
          description: OK
  /draft-chats/{id}:
    post:
      summary: Send a message to the AI draft editor
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: responseMode
          in: query
          required: false
          schema:
            type: string
            enum: [legacy, grouped, dual]
          description: Controls payload shape during rollout. Defaults to `grouped`.
        - name: x-draft-chat-response-mode
          in: header
          required: false
          schema:
            type: string
            enum: [legacy, grouped, dual]
          description: Header override for response payload mode. Defaults to grouped response.
        - name: idempotency-key
          in: header
          required: false
          schema:
            type: string
          description: Optional replay key. Same key and base revision produce the same changeSetId.
        - name: x-request-id
          in: header
          required: false
          schema:
            type: string
          description: Optional request correlation id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftChatRequest"
      responses:
        "200":
          description: AI generated structured edits
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiResponse"
                  - type: object
                    properties:
                      response:
                        oneOf:
                          - $ref: "#/components/schemas/DraftAiEditResponse"
                          - $ref: "#/components/schemas/DraftAiEditDualResponse"
                          - $ref: "#/components/schemas/DraftAiLegacyResponse"
    get:
      summary: Get chat history for draft
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat history
  /exams:
    post:
      summary: Create exam (dolgozat)
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string, nullable: true }
                subjectId: { type: integer, nullable: true }
                schoolClassId: { type: integer, nullable: true }
                rubric: { type: string, nullable: true }
      responses:
        "201":
          description: Created
    get:
      summary: List my exams
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
  /exams/{id}:
    get:
      summary: Get exam with questions and linked files
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
    put:
      summary: Update exam metadata
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string, nullable: true }
                rubric: { type: string, nullable: true }
                isPublished: { type: boolean }
      responses:
        "200":
          description: OK
    delete:
      summary: Delete exam
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
  /exams/{id}/questions:
    put:
      summary: Replace all questions (ordered); cannot remove questions if submissions exist
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [questions]
              properties:
                questions:
                  type: array
                  items:
                    $ref: "#/components/schemas/ExamQuestionInput"
      responses:
        "200":
          description: OK
        "409":
          description: Cannot remove questions when submissions exist
  /exams/{id}/share:
    post:
      summary: Enable share token for public read-only exam
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
    delete:
      summary: Disable share token
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
  /exams/{id}/submissions:
    post:
      summary: Create submission (manual or OCR stub)
      security:
        - bearerAuth: []

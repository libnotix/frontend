        "201":
          description: Created
    get:
      summary: List submissions for exam
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
  /exam-link/{id}:
    post:
      summary: Link file to exam
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [fileId]
              properties:
                fileId: { type: integer }
